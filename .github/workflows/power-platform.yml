name: Power Platform ALM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - power-platform/**

jobs:
  export-from-dev:
    runs-on: windows-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: WhoAmI (Dev)
        uses: microsoft/powerplatform-actions/who-am-i@v1
        with:
          environment-url: ${{ secrets.PP_DEV_URL || vars.PP_DEV_URL }}
          app-id: ${{ secrets.PP_APP_ID || vars.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID || vars.PP_TENANT_ID }}

      - name: Export unmanaged solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.PP_DEV_URL || vars.PP_DEV_URL }}
          app-id: ${{ secrets.PP_APP_ID || vars.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID || vars.PP_TENANT_ID }}
          solution-name: AccountantDeliveryPlatform
          solution-output-file: out/AccountantDeliveryPlatform.zip
          managed: false

      - name: Unpack solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: out/AccountantDeliveryPlatform.zip
          solution-folder: power-platform/solution/src
          solution-type: Unmanaged

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: adp-solution-unmanaged
          path: out/AccountantDeliveryPlatform.zip

  deploy-test:
    runs-on: windows-latest
    needs: export-from-dev
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: adp-solution-unmanaged
          path: out

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Import into test
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PP_TEST_URL || vars.PP_TEST_URL }}
          app-id: ${{ secrets.PP_APP_ID || vars.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID || vars.PP_TENANT_ID }}
          solution-file: out/AccountantDeliveryPlatform.zip
          async-operation: true

  deploy-prod:
    runs-on: windows-latest
    needs: deploy-test
    environment:
      name: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: adp-solution-unmanaged
          path: out

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Export managed for prod
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.PP_DEV_URL || vars.PP_DEV_URL }}
          app-id: ${{ secrets.PP_APP_ID || vars.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID || vars.PP_TENANT_ID }}
          solution-name: AccountantDeliveryPlatform
          solution-output-file: out/AccountantDeliveryPlatform_managed.zip
          managed: true

      - name: Import managed into prod
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PP_PROD_URL || vars.PP_PROD_URL }}
          app-id: ${{ secrets.PP_APP_ID || vars.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID || vars.PP_TENANT_ID }}
          solution-file: out/AccountantDeliveryPlatform_managed.zip
          async-operation: true
